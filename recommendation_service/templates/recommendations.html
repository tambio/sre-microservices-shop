<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рекомендации - SneakStore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; }
        .container { max-width: 1000px; margin-top: 40px; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; }
        .navbar-brand { color: white !important; font-weight: bold; font-size: 24px; }
        .nav-link { color: rgba(255,255,255,0.9) !important; font-weight: 500; }
        .nav-link:hover { color: white !important; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-img-top { height: 250px; object-fit: cover; border-radius: 15px 15px 0 0; }
        .no-image { height: 250px; background: #e9ecef; display: flex; align-items: center; justify-content: center; font-size: 60px; border-radius: 15px 15px 0 0; }
        .category-badge { position: absolute; top: 10px; right: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-dark px-4 mb-4">
            <a class="navbar-brand" href="http://localhost:8080"> SneakStore</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="http://localhost:8080">Главная</a>
                <a class="nav-link" href="http://localhost:5006">Остатки</a>
                <a class="nav-link" href="http://localhost:5007">Рекомендации</a>
            </div>
        </nav>

        <h2 class="text-center mb-4">🎯 Рекомендовано для вас</h2>
        <p class="text-center text-muted mb-4">Подюорка бестселлеров</p>

        <div class="row">
            {% for item in recommendations %}
            <div class="col-md-4">
                <div class="card">
                    <div style="position: relative;">
                        {% if item.image_url %}
                            <img src="{{ item.image_url }}" class="card-img-top" alt="{{ item.name }}">
                        {% else %}
                            <div class="no-image">🛍️</div>
                        {% endif %}
                        <span class="category-badge">Подборка</span>
                    </div>
                    <div class="card-body text-center">
                        <h5>{{ item.name }}</h5>
                        <p class="text-muted">В наличии: {{ item.stock }} шт.</p>
                        <h4 class="text-primary">${{ item.price }}</h4>
                        <a href="http://localhost:8080" class="btn btn-outline-primary mt-2">Перейти к покупке</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
