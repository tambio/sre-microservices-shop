<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .product-card {
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-shoe-prints text-3xl text-orange-600"></i>
                <h1 class="text-3xl font-bold text-gray-900">SneakStore</h1>
            </div>
            
            <form action="/search" class="flex-1 max-w-xl mx-8">
                <div class="relative">
                    <input type="text" name="q" value="{{ search_query }}" 
                           class="w-full bg-gray-100 border border-gray-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 rounded-full py-3 px-6 pl-12 text-lg outline-none"
                           placeholder="Поиск кроссовок...">
                    <button type="submit" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-orange-600">
                        <i class="fa-solid fa-magnifying-glass text-xl"></i>
                    </button>
                </div>
            </form>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-3xl font-semibold mb-8">
            {% if search_query %}
                Результаты по "{{ search_query }}"
            {% else %}
                Асортимент 
            {% endif %}
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            {% for p in products %}
            <div class="product-card bg-white rounded-3xl overflow-hidden border border-gray-200">
                    <img src="{{ url_for('static', filename='images/' + p.image) }}" 
                    alt="{{ p.name }}" 
                    class="w-full h-64 object-cover">                <div class="p-6">
                    <h3 class="text-xl font-semibold text-gray-900">{{ p.name }}</h3>
                    <p class="text-2xl font-bold text-orange-600 mt-2">${{ p.price }}</p>
                    <p class="text-gray-600 mt-3 text-sm line-clamp-2">{{ p.description }}</p>
                    
                    <div class="flex gap-3 mt-6">
                        <a href="/product/{{ p.id }}" class="flex-1 bg-gray-900 text-white text-center py-3 rounded-2xl hover:bg-black transition">
                            Купить!
                        </a>
                        <a href="/add-to-cart/{{ p.id }}" class="flex-1 border border-gray-300 text-center py-3 rounded-2xl hover:bg-gray-100 transition flex items-center justify-center gap-2">
                            <i class="fa-solid fa-cart-shopping"></i>
                            В корзину
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        {% if not products %}
        <div class="text-center py-20">
            <p class="text-6xl mb-4">😔</p>
            <p class="text-2xl text-gray-500">Ничего не нашли</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
