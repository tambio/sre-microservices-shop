apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: sneakstore
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: sneakstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: sneakstore
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
