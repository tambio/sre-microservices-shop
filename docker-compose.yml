version: '3.8'

services:
  auth-service:
    build: ./auth_service
    container_name: auth_service
    ports:
      - "5001:5000"
    networks:
      - app-network

  product-service:
    build: ./product_service
    container_name: product_service
    ports:
      - "80:5000"    
    networks:
      - app-network
  order-service:
    build: ./order_service
    container_name: order_service
    environment:
      DB_HOST: host.docker.internal   
      DB_NAME: sneakstore
      DB_USER: postgres              
      DB_PASSWORD: postgres          
    ports:
      - "5003:5000"
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"  

  user-service:
    build: ./user_service
    container_name: user_service
    ports:
      - "5004:5000"
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network
    depends_on:
      - prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@host.docker.internal:5432/sneakstore?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  app-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: