version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: sneakstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network


  auth-service:
    build: ./auth_service
    container_name: auth_service
    restart: unless-stopped
    ports:
      - "5001:5000"
    networks:
      - app-network

  product-service:
    build: ./product_service
    container_name: product_service
    restart: unless-stopped
    ports:
      - "8080:5000"
    environment:
      DB_HOST: postgres
      DB_NAME: sneakstore
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres
    networks:
      - app-network

  order-service:
    build: ./order_service
    container_name: order_service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_NAME: sneakstore
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5003:5000"
    depends_on:
      - postgres
    networks:
      - app-network

  user-service:
    build: ./user_service
    container_name: user_service
    restart: unless-stopped
    ports:
      - "5004:5000"
    networks:
      - app-network

  inventory-service:
    build: ./inventory_service
    container_name: inventory_service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_NAME: sneakstore
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5006:5000"
    depends_on:
      - postgres
    networks:
      - app-network

  recommendation-service:
    build: ./recommendation_service
    container_name: recommendation_service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_NAME: sneakstore
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5007:5000"
    depends_on:
      - postgres
    networks:
      - app-network

 
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network
    depends_on:
      - prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/sneakstore?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - app-network
    depends_on:
      - postgres

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - app-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - app-network

volumes:
  postgres_data:
  es_data:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge