<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - SneakStore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; }
        .container { max-width: 500px; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; margin-top: 20px; }
        .navbar-brand { color: white !important; font-weight: bold; font-size: 24px; }
        .nav-link { color: rgba(255,255,255,0.9) !important; font-weight: 500; }
        .login-card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .btn-login { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 25px; padding: 12px; width: 100%; font-size: 18px; }
        .btn-login:hover { background: linear-gradient(135deg, #5a6fd6, #6a4192); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-dark px-4">
            <a class="navbar-brand" href="/"> SneakStore</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Главная</a>
                <a class="nav-link" href="/login">Войти</a>
                <a class="nav-link" href="/orders">Заказы</a>
            </div>
        </nav>

        {% if message %}
        <div class="alert alert-{{ 'success' if msg_type == 'success' else 'danger' }} mt-3 text-center">
            {{ message }}
        </div>
        {% endif %}

        <div class="card login-card p-4">
            <h3 class="text-center mb-4"> Вход в систему</h3>
            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input type="text" name="username" class="form-control" placeholder="user1 или admin" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" placeholder="pass1 или admin123" required>
                </div>
                <button type="submit" class="btn btn-login">Войти</button>
            </form>
            <p class="text-center mt-3">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>

        </div>
    </div>
</body>
</html>
