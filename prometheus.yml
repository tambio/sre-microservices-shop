global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth_service'
    static_configs:
      - targets: ['auth_service_tf:5000']

  - job_name: 'product_service'
    static_configs:
      - targets: ['product_service_tf:5000']

  - job_name: 'order_service'
    static_configs:
      - targets: ['order_service_tf:5000']

  - job_name: 'user_service'
    static_configs:
      - targets: ['user_service_tf:5000']

  - job_name: 'postgres_exporter'
    static_configs:
      - targets: ['postgres_exporter_tf:9187']

  - job_name: 'inventory_service'
    static_configs:
      - targets: ['inventory_service_tf:5000']

  - job_name: 'recommendation_service'
    static_configs:
      - targets: ['recommendation_service_tf:5000']